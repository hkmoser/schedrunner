# repos.yaml — ecosystem manifest. Index of repos + mirror flags.
# Per-repo run/deploy behaviour lives in each repo's own service.yaml, not here.
repos:
  - name: schedrunner
    type: orchestrator
    remote: git@github.com:hkmoser/schedrunner.git
    mirror: false

  - name: findmypy
    type: service
    remote: git@github.com:hkmoser/findmypy.git
    mirror: true

  - name: sync-ynab
    type: service
    remote: git@github.com:hkmoser/sync-ynab.git
    mirror: true

  - name: messages-export
    type: service
    remote: git@github.com:hkmoser/messages-export.git
    mirror: true

  - name: ha-events
    type: service
    remote: git@github.com:hkmoser/ha-events.git
    mirror: true

  - name: boot-notify
    type: service
    remote: git@github.com:hkmoser/boot-notify.git
    mirror: true

  - name: iOS-shell
    type: app
    remote: git@github.com:hkmoser/iOS-shell.git
    mirror: true

  # native iOS apps are type: app (schedrunner builds them, never runs them).
  # Add these later, after the mirror is populated:
  # - name: <ios-app>
  #   type: app
  #   remote: <its remote>
  #   mirror: true
