# Test run every minute
interval|1|/Users/joemoser/Dropbox/Source/schedrunner/test.sh
interval|2|/Users/joemoser/Dropbox/Source/schedrunner/new.sh
interval|5|/Users/joemoser/Dropbox/Source/afm/findmypy/.venv/bin/python /Users/joemoser/Dropbox/Source/afm/findmypy/afm_live.py
interval|60|/Users/joemoser/Dropbox/Source/sync-ynab/get_all.py
# startup|ignored|/Users/joemoser/Dropbox/Source/schedrunner/get_dns.py

# Auto-deploy: poll repos with .auto-deploy flag, pull main + make update on new commits
interval|1|/Users/joemoser/Dropbox/Source/schedrunner/auto-deploy.sh

# Provision repos: create any repo listed in repos.register that doesn't exist yet
interval|2|/Users/joemoser/Dropbox/Source/schedrunner/provision-repos.sh

# Messages export: scrape all iMessage/SMS to Google Drive /Private/Messages/ daily at 2am
interval|60|/Users/joemoser/Dropbox/Source/messages-export/run_export.sh

# ha-events: start the Home Assistant events listener at boot so it survives
# reboots. Restarts on new commits are handled separately by the repo's
# .auto-deploy hook. (startup fires while machine uptime < 90s.)
startup|ignored|/Users/joemoser/Dropbox/Source/ha-events/run.sh

# boot-notify: post-boot health check — waits 3 min for services to settle,
# then sends a Pushcut "Mac Boot" notification summarising system status.
startup|ignored|/Users/joemoser/Dropbox/Source/boot-notify/run.sh

# Schemas refresh: regenerate iOS-shell docs/SCHEMAS.md daily (early morning).
# cd into the repo first (runner does not cd) so the script's git ops run from
# the repo root; the first run pushes the schemas/auto branch.
daily|04:30|cd /Users/joemoser/Dropbox/Source/iOS-shell && bash Deploy/refresh_schemas.sh

# Ecosystem mirror: refresh read-only source snapshots in mirror/ every 3 hours.
interval|180|cd /Users/joemoser/Dropbox/Source/schedrunner && node scripts/sync-mirror.mjs
